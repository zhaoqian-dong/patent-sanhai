      gap: 10px;
      margin-top: 12px;

      background: #0ea5e9;
      color: #ffffff;
      cursor: pointer;
      font-weight: 600;

      margin-top: 10px;
      color: #fbbf24;
      font-size: 13px;
      display: none;
    }
    #deck { display: none; width: 100%; height: 100%; border: 0; }
